{% extends 'base.html' %}
{% load static %}

{% block extra_head %}
    <style>
        .hero-section {
            position: relative; 
            width: 100%; 
            height: calc(100vh - 100px); 
            background-image: url("{% static 'images/1.jpeg' %}");
            background-size: cover; 
            background-position: center;
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }
        .hero-content { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: flex-start; 
            padding-right: 12%; 
            z-index: 10; 
        }
        .text-content { 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        /* تعديل لعنصر الصورة */
        .title-image {
            max-width: 350px; /* يمكنك تعديل العرض حسب حجم صورتك */
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(2px 2px 15px rgba(0,0,0,0.7));
            transition: transform 0.3s;
        }
        .title-image:hover {
            transform: scale(1.02);
        }
        
        .subtitle-ar { color: #ffffff; font-size: 24px; font-weight: 700; margin-bottom: 5px; text-shadow: 1px 1px 8px rgba(0,0,0,0.8); }
        .subtitle-en { color: #d1d1d1; font-size: 16px; font-family: sans-serif; margin-bottom: 35px; letter-spacing: 1px; }
        
        .cta-button {
            background-color: #ef6424; color: #ffffff; padding: 12px 45px; border-radius: 30px; 
            text-decoration: none; font-size: 18px; font-weight: 700;
            box-shadow: 0 4px 15px rgba(239, 100, 36, 0.4); transition: transform 0.3s, background-color 0.3s;
        }
        .cta-button:hover { background-color: #d8561c; transform: translateY(-3px); }
    </style>
{% endblock %}

{% block content %}
    <div class="hero-section">
        <main class="hero-content">
            <div class="text-content">
                <a>
                    <img src="{% static 'images/x.png' %}" alt="منتخب الفنون الشعبية" class="title-image">
                </a>
                
                <p class="subtitle-ar">جسد يتحرك... تراث يحكى</p>
                <p class="subtitle-en">where bodies move and heritage speaks</p>
                <a href="#" class="cta-button">استكشف العروض</a>
            </div>
        </main>
    </div>
{% endblock %}
